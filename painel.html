<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PILAR Imports — Painel Operacional</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="painel/js/calc.js"></script>
<style>
:root {
  --turquesa: #00BCD4;
  --turquesa-dark: #0097A7;
  --cinza: #37474F;
  --cinza-med: #607D8B;
  --cinza-light: #ECEFF1;
  --border: #CFD8DC;
  --bg: #F5F7F8;
  --white: #fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--cinza);font-size:14px}

/* ── Header — idêntico ao index.html ── */
.header{background:var(--cinza);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:16px;font-weight:400;opacity:.9}
.header-right{margin-left:auto;font-size:13px;opacity:.7}
.header-right a{color:rgba(255,255,255,.75);text-decoration:none}
.header-right a:hover{color:#fff}

/* ── Layout ── */
.painel-layout{display:flex;height:calc(100vh - 78px)}

/* ── Sidebar ── */
.sidebar{
  width:210px;
  min-width:210px;
  background:var(--cinza);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  flex-shrink:0;
}
.nav-sep{
  padding:16px 16px 4px;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:rgba(255,255,255,.35);
}
.nav-link{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 16px;
  color:rgba(255,255,255,.72);
  font-size:13px;
  text-decoration:none;
  border:none;
  background:none;
  width:100%;
  text-align:left;
  cursor:pointer;
  transition:background .15s, color .15s;
}
.nav-link:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-link.active{background:var(--turquesa);color:#fff;font-weight:600}
.nav-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0}

.sidebar-footer{
  margin-top:auto;
  padding:16px;
  border-top:1px solid rgba(255,255,255,.1);
  font-size:11px;
  color:rgba(255,255,255,.35);
}

/* ── Área de conteúdo ── */
.content-area{
  flex:1;
  padding:24px;
  overflow-y:auto;
  min-width:0;
}

/* ── Cards — mesmo estilo do index.html ── */
.card{background:var(--white);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:20px;overflow:hidden}
.card-hd{background:var(--cinza);color:#fff;padding:10px 20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-hd.tq{background:var(--turquesa)}
.card-bd{padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--cinza-med)}
.field input,.field select{padding:8px 10px;border:1px solid var(--border);border-radius:4px;font-size:14px;color:var(--cinza);width:100%;transition:border-color .15s;font-family:inherit;background:var(--white)}
.field input:focus,.field select:focus{outline:none;border-color:var(--turquesa)}
.note{font-size:11px;color:var(--cinza-med);margin-top:2px}
.btn{padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:inherit}
.btn-p{background:var(--turquesa);color:#fff}
.btn-p:hover{background:var(--turquesa-dark)}
.btn-s{background:var(--cinza-light);color:var(--cinza);border:1px solid var(--border)}
.btn-s:hover{background:var(--border)}
.btn-sm{padding:4px 10px;font-size:12px}

/* ── Tabela de itens do pedido ── */
.items-tbl{width:100%;table-layout:fixed;border-collapse:collapse;font-size:12px}
.items-tbl th{background:var(--cinza);color:#fff;padding:6px 4px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden}
.items-tbl td{padding:3px 4px;border-bottom:1px solid var(--cinza-light);vertical-align:middle;overflow:hidden}
.items-tbl td:first-child{padding-left:6px;color:var(--cinza-med);font-size:12px;text-align:center}
.items-tbl input,.items-tbl select{padding:5px 4px;border:1px solid var(--border);border-radius:3px;font-size:12px;width:100%;background:var(--white);font-family:inherit;color:var(--cinza);box-sizing:border-box}
.items-tbl input:focus,.items-tbl select:focus{outline:none;border-color:var(--turquesa)}

/* ── Tabela lista de processos ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--cinza-med);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--cinza-light)}
.tbl tbody tr:hover{background:#F9FBFC;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-ativo{background:#E8F5E9;color:#2E7D32}
.badge-concluido{background:#E3F2FD;color:#1565C0}
.badge-arquivado{background:var(--cinza-light);color:var(--cinza-med)}

/* ── Textarea — mesmo padrão dos inputs ── */
.field textarea{padding:8px 10px;border:1px solid var(--border);border-radius:4px;font-size:14px;color:var(--cinza);width:100%;transition:border-color .15s;font-family:inherit;background:var(--white);resize:vertical}
.field textarea:focus{outline:none;border-color:var(--turquesa)}
/* ── Toast ── */
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Pipeline dots ── */
.pipe-dot{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0;cursor:default}
.pipe-done{background:#2E7D32;color:#fff}
.pipe-active{background:var(--turquesa);color:#fff;box-shadow:0 0 0 3px rgba(0,188,212,.25)}
.pipe-future{background:var(--cinza-light);color:var(--cinza-med);border:1px solid var(--border)}
.pipe-line{display:inline-block;width:14px;height:2px;flex-shrink:0;vertical-align:middle}

/* ── KPI cards — mesmo estilo do index.html ── */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:0}
.sum-item{text-align:center;padding:18px 14px;background:var(--cinza-light);border-radius:8px}
.sum-item .val{font-size:22px;font-weight:700;color:var(--turquesa-dark)}
.sum-item .lbl{font-size:11px;color:var(--cinza-med);margin-top:5px;text-transform:uppercase;letter-spacing:.4px}
.sum-item.dk{background:var(--cinza)}
.sum-item.dk .val{color:var(--turquesa)}
.sum-item.dk .lbl{color:rgba(255,255,255,.6)}
</style>
</head>
<body>

<!-- Header idêntico ao index.html -->
<div class="header">
  <img src="web_Logo_sem assinatura_turquesa.png" style="height:50px" alt="PILAR">
  <h1>Painel Operacional de Importação</h1>
  <div class="header-right">
    <a href="index.html">← Calculadora</a>
  </div>
</div>

<!-- Layout: sidebar + conteúdo -->
<div class="painel-layout">

  <nav class="sidebar">
    <div class="nav-sep">Visão Geral</div>
    <a class="nav-link active" href="#" onclick="return navTo(this, renderDashboard)">
      <span class="nav-icon">◈</span> Dashboard
    </a>

    <div class="nav-sep">Importação</div>
    <a class="nav-link" href="#" onclick="return navTo(this, renderNovoProcesso)">
      <span class="nav-icon">＋</span> Novo Processo
    </a>
    <a class="nav-link" href="#" onclick="return navTo(this, renderProcessos)">
      <span class="nav-icon">≡</span> Processos
    </a>

    <div class="nav-sep">Documentos</div>
    <a class="nav-link" href="#" onclick="return navTo(this, renderOrderRequest)">
      <span class="nav-icon">📋</span> Order Request
    </a>
    <a class="nav-link" href="#" onclick="return navTo(this, renderResumoDespachante)">
      <span class="nav-icon">📄</span> Resumo Despachante
    </a>

    <div class="nav-sep">Financeiro</div>
    <a class="nav-link" href="#" onclick="return navTo(this, renderFluxoCaixa)">
      <span class="nav-icon">📊</span> Fluxo de Caixa
    </a>

    <div class="nav-sep">Produtos</div>
    <a class="nav-link" href="#" onclick="return navTo(this, renderCatalogo)">
      <span class="nav-icon">📦</span> Catálogo Omie
    </a>

    <div class="nav-sep">Sistema</div>
    <a class="nav-link" href="#" onclick="return navTo(this, renderConfig)">
      <span class="nav-icon">⚙</span> Configurações
    </a>

    <div class="sidebar-footer">
      Painel v1.0
    </div>
  </nav>

  <!-- Conteúdo — preenchido pelos módulos -->
  <div id="vc" class="content-area"></div>

</div>

<script>
// ── Navegação ──────────────────────────────────────────────────────────────
function navTo(link, renderFn) {
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  link.classList.add('active');
  renderFn();
  return false; // cancela o href="#"
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard() {
  const processos  = JSON.parse(localStorage.getItem('pilar_processos') || '[]');
  const produtos   = JSON.parse(localStorage.getItem('pilar_produtos')  || '[]');
  const ativos     = processos.filter(p => p.status === 'ativo');
  const fobTotal   = processos.reduce((s, p) => s + (p.resultado?.fob_total_usd || 0), 0);
  const itensTotal = processos.reduce((s, p) => s + (p.itens?.length || 0), 0);

  const eventos  = dashEventos(ativos);
  const evHTML   = eventos.slice(0, 14).map(dashEventoHTML).join('') ||
    '<div style="padding:24px;text-align:center;color:var(--cinza-med);font-size:13px">Nenhum evento nos próximos 30 dias.</div>';
  const pipeHTML = ativos.map(dashPipelineRow).join('') ||
    '<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--cinza-med)">Nenhum processo ativo.</td></tr>';

  document.getElementById('vc').innerHTML = `
    <div class="sum-grid" style="margin-bottom:24px">
      <div class="sum-item">
        <div class="val">${ativos.length}</div>
        <div class="lbl">Processos Ativos</div>
      </div>
      <div class="sum-item">
        <div class="val">USD ${fmtN(fobTotal)}</div>
        <div class="lbl">FOB Total USD</div>
      </div>
      <div class="sum-item">
        <div class="val">${itensTotal}</div>
        <div class="lbl">Itens Pedidos</div>
      </div>
      <div class="sum-item dk">
        <div class="val">${produtos.length}</div>
        <div class="lbl">Produtos Omie</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px;align-items:start">

      <div class="card" style="margin-bottom:0">
        <div class="card-hd tq">Próximos Eventos — 30 dias</div>
        <div style="padding:0">${evHTML}</div>
      </div>

      <div class="card" style="margin-bottom:0">
        <div class="card-hd">Ações Rápidas</div>
        <div class="card-bd" style="display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-p" onclick="
            document.querySelectorAll('.nav-link').forEach(el=>el.classList.remove('active'));
            document.querySelector('.nav-link[onclick*=renderNovoProcesso]').classList.add('active');
            renderNovoProcesso()">+ Novo Processo</button>
          <button class="btn btn-s" onclick="return navTo(document.querySelector('.nav-link[onclick*=renderFluxoCaixa]'), renderFluxoCaixa)">📊 Fluxo de Caixa</button>
          <button class="btn btn-s" onclick="return navTo(document.querySelector('.nav-link[onclick*=renderOrderRequest]'), renderOrderRequest)">📋 Order Request</button>
          <hr style="border:none;border-top:1px solid var(--border)">
          <a href="index.html" class="btn btn-s" style="text-align:center">← Calculadora</a>
        </div>
      </div>

    </div>

    <div class="card" style="margin-bottom:0">
      <div class="card-hd">Processos Ativos — Pipeline</div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>Processo</th><th>Cliente</th>
            <th>
              <div style="display:flex;align-items:center;gap:2px;font-size:10px;font-weight:600;letter-spacing:.3px">
                <span style="width:24px;text-align:center">Ped.</span>
                <span style="width:14px"></span>
                <span style="width:24px;text-align:center">Emb.</span>
                <span style="width:14px"></span>
                <span style="width:24px;text-align:center">Porto</span>
                <span style="width:14px"></span>
                <span style="width:24px;text-align:center">Cli.</span>
              </div>
            </th>
            <th style="text-align:right">FOB USD</th>
            <th>Próximo Evento</th>
          </tr></thead>
          <tbody>${pipeHTML}</tbody>
        </table>
      </div>
    </div>`;
}

// ── Dashboard helpers ──────────────────────────────────────────────────────

function dashDiasRel(d) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diff = Math.round((d - hoje) / 86400000);
  if (diff === 0) return { txt: 'hoje',            cor: '#E65100' };
  if (diff  >  0) return { txt: `em ${diff}d`,    cor: '#2E7D32' };
  return               { txt: `há ${-diff}d`,    cor: '#C62828' };
}

function dashEventos(ativos) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const d30  = new Date(hoje); d30.setDate(hoje.getDate() + 30);
  const d7a  = new Date(hoje); d7a.setDate(hoje.getDate() - 7);
  const ev   = [];

  ativos.forEach(proc => {
    const g = proc.dados_gerais || {};
    const add = (dataStr, icone, desc) => {
      if (!dataStr) return;
      const d = new Date(dataStr + 'T12:00');
      if (d >= d7a && d <= d30) ev.push({ d, icone, desc, numero: proc.numero });
    };
    add(g.prev_embarque,        '🚢', 'Embarque');
    add(g.prev_chegada_porto,   '⚓', 'Chegada Porto');
    add(g.prev_chegada_cliente, '📦', 'Chegada Cliente');
    // Lê dados salvos pelo Fluxo de Caixa
    const procFresh = JSON.parse(localStorage.getItem('pilar_processos') || '[]')
      .find(x => x.id === proc.id) || proc;
    (procFresh.pagamentos_fornecedor||[])
      .filter(p => p.status !== 'pago' && p.data_prevista)
      .forEach(p => add(p.data_prevista, '💸', `Pgto ${p.descricao||'fornecedor'}`));
    (procFresh.recebimentos_cliente||[])
      .filter(r => r.status !== 'recebido' && r.data_prevista)
      .forEach(r => add(r.data_prevista, '💰', `Recebimento ${r.descricao||'cliente'}`));
  });

  return ev.sort((a, b) => a.d - b.d);
}

function dashEventoHTML(e) {
  const rel    = dashDiasRel(e.d);
  const dataBR = e.d.toLocaleDateString('pt-BR');
  return `
    <div style="display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--cinza-light)">
      <span style="font-size:15px;width:22px;text-align:center;flex-shrink:0">${e.icone}</span>
      <span style="font-size:11px;font-weight:700;color:var(--turquesa-dark);white-space:nowrap;min-width:88px">${e.numero}</span>
      <span style="font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.desc}</span>
      <span style="font-size:12px;color:var(--cinza-med);white-space:nowrap">${dataBR}</span>
      <span style="font-size:11px;font-weight:700;white-space:nowrap;min-width:52px;text-align:right;color:${rel.cor}">${rel.txt}</span>
    </div>`;
}

function dashProximoEvento(proc) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const g = proc.dados_gerais || {};
  let proxD = null, proxDesc = '';
  const check = (s, desc) => {
    if (!s) return;
    const d = new Date(s + 'T12:00');
    if (d >= hoje && (!proxD || d < proxD)) { proxD = d; proxDesc = desc; }
  };
  check(g.prev_embarque,        'Embarque');
  check(g.prev_chegada_porto,   'Porto');
  check(g.prev_chegada_cliente, 'Cliente');
  (proc.pagamentos_fornecedor||[]).filter(p=>p.status!=='pago')
    .forEach(p => check(p.data_prevista, `Pgto ${p.descricao||''}`));
  (proc.recebimentos_cliente||[]).filter(r=>r.status!=='recebido')
    .forEach(r => check(r.data_prevista, 'Recebimento'));
  if (!proxD) return '<span style="color:var(--cinza-med)">—</span>';
  const diff = Math.round((proxD - hoje) / 86400000);
  const rel  = diff === 0 ? 'hoje' : diff > 0 ? `em ${diff}d` : `há ${-diff}d`;
  const cor  = diff < 0 ? '#C62828' : diff === 0 ? '#E65100' : 'inherit';
  return `<span style="font-size:12px">${proxDesc}</span> <span style="font-size:11px;font-weight:600;color:${cor}">${rel}</span>`;
}

function dashPipelineRow(proc) {
  const g    = proc.dados_gerais || {};
  const hoje = new Date(); hoje.setHours(12,0,0,0);
  const toD  = s => s ? new Date(s + 'T12:00') : null;
  const fob  = proc.resultado?.fob_total_usd ||
               (proc.itens||[]).reduce((s,it) => s+(it.quantidade||0)*(it.fob_unit_usd||0), 0);

  const emb = toD(g.prev_embarque);
  const prt = toD(g.prev_chegada_porto);
  const cli = toD(g.prev_chegada_cliente);

  const embDone = emb && emb <= hoje;
  const prtDone = prt && prt <= hoje;
  const cliDone = cli && cli <= hoje;

  // First incomplete stage with a date is 'active'
  let actSet = false;
  const stg = (done, hasDate) => {
    if (done) return 'pipe-done';
    if (!actSet && hasDate) { actSet = true; return 'pipe-active'; }
    return 'pipe-future';
  };

  const c1 = stg(embDone, !!emb);
  const c2 = stg(prtDone, !!prt);
  const c3 = stg(cliDone, !!cli);
  const ln = done => `<span class="pipe-line" style="background:${done?'#2E7D32':'var(--border)'}"></span>`;
  const dot = (cls, ic, tip) => `<span class="pipe-dot ${cls}" title="${tip}">${ic}</span>`;

  return `<tr onclick="procEditar(${proc.id})" style="cursor:pointer" onmouseover="this.style.background='#F0FAFB'" onmouseout="this.style.background=''">
    <td style="font-weight:700">${proc.numero||'—'}</td>
    <td>${g.cliente||'—'}</td>
    <td>
      <div style="display:flex;align-items:center;gap:2px">
        ${dot('pipe-done','✓', `Pedido — ${g.data_pedido||proc.criado_em?.slice(0,10)||'—'}`)}
        ${ln(embDone)}
        ${dot(c1,'🚢',`Embarque — ${g.prev_embarque||'sem data'}`)}
        ${ln(prtDone)}
        ${dot(c2,'⚓',`Chegada Porto — ${g.prev_chegada_porto||'sem data'}`)}
        ${ln(cliDone)}
        ${dot(c3,'📦',`Chegada Cliente — ${g.prev_chegada_cliente||'sem data'}`)}
      </div>
    </td>
    <td style="text-align:right;font-variant-numeric:tabular-nums">USD ${fmtN(fob)}</td>
    <td style="min-width:140px">${dashProximoEvento(proc)}</td>
  </tr>`;
}

// ── Configurações ──────────────────────────────────────────────────────────
function renderConfig() {
  const cfg = JSON.parse(localStorage.getItem('pilar_config') || '{}');
  const o = cfg.omie    || {};
  const e = cfg.empresa || {};
  const d = cfg.defaults || {};

  document.getElementById('vc').innerHTML = `
    <div style="max-width:780px">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:18px;font-weight:700">Configurações</h2>
        <button class="btn btn-p" onclick="salvarConfig()">Salvar Configurações</button>
      </div>

      ${location.protocol === 'file:' ? `
      <div style="background:#FFF8E1;border:1px solid #F9A825;border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#5D4037">
        ⚠ Para conectar ao Omie, abra via <strong>http://localhost:8080/painel.html</strong> — não via file://<br>
        <span style="font-size:12px;opacity:.8">No terminal: <code style="background:#F5F5F5;padding:1px 6px;border-radius:3px">bash serve.sh</code></span>
      </div>` : ''}

      <div class="card">
        <div class="card-hd tq">Integração Omie</div>
        <div class="card-bd">
          <div class="g2">
            <div class="field">
              <label>App Key</label>
              <input type="text" id="cfg-app-key" value="${e_(o.app_key)}" autocomplete="off">
            </div>
            <div class="field">
              <label>App Secret</label>
              <input type="password" id="cfg-app-secret" value="${e_(o.app_secret)}" autocomplete="off">
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
            <button class="btn btn-s" onclick="testarOmie()">Testar conexão Omie</button>
            <span id="omie-status" style="font-size:13px"></span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-hd">Dados da Empresa</div>
        <div class="card-bd">
          <div class="g2">
            <div class="field">
              <label>Razão Social</label>
              <input type="text" id="cfg-razao" value="${e_(e.razao)}">

async function testarOmie() {
  const statusEl = document.getElementById('omie-status');
  statusEl.textContent = 'Testando…';
  statusEl.style.color = '#607D8B';

  try {
    const r = await fetch('/omie', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        call:   'ListarProdutos',
        params: [{ pagina: 1, registros_por_pagina: 1, filtrar_apenas_omiepdv: "N" }]
      })
    });
    const data = await r.json();
    if (data.faultstring) throw new Error(data.faultstring);
    if (data.erro)        throw new Error(data.erro);
    statusEl.textContent = '✓ Conectado — Omie respondeu com sucesso.';
    statusEl.style.color = '#2E7D32';
  } catch (err) {
    statusEl.textContent = '✗ ' + err.message;
    statusEl.style.color = '#C62828';
  }
}

function exportarDados() {
  const keys = ['pilar_processos', 'pilar_produtos', 'pilar_config', 'pilar_descricoes_di'];
  const backup = {};
  keys.forEach(k => {
    const v = localStorage.getItem(k);
    if (v) backup[k] = JSON.parse(v);
  });
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'pilar_backup.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Backup exportado: pilar_backup.json');
}

function importarDados() {
  const input   = document.createElement('input');
  input.type    = 'file';
  input.accept  = '.json';
  input.onchange = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let data;
      try { data = JSON.parse(ev.target.result); }
      catch { toast('Arquivo inválido — não é um JSON válido.'); return; }

      const processos = Array.isArray(data.pilar_processos) ? data.pilar_processos : [];
      const produtos  = Array.isArray(data.pilar_produtos)  ? data.pilar_produtos  : [];

      const existProc = JSON.parse(localStorage.getItem('pilar_processos') || '[]').length;
      const existProd = JSON.parse(localStorage.getItem('pilar_produtos')  || '[]').length;

      if ((existProc > 0 || existProd > 0) &&
          !confirm(`Isso irá sobrescrever ${existProc} processo(s) e ${existProd} produto(s) existentes. Continuar?`)) return;

      if (data.pilar_processos    !== undefined) localStorage.setItem('pilar_processos',    JSON.stringify(processos));
      if (data.pilar_produtos     !== undefined) localStorage.setItem('pilar_produtos',     JSON.stringify(produtos));
      if (data.pilar_config       !== undefined) localStorage.setItem('pilar_config',       JSON.stringify(data.pilar_config));
      if (data.pilar_descricoes_di !== undefined) localStorage.setItem('pilar_descricoes_di', JSON.stringify(data.pilar_descricoes_di));

      toast(`✓ Importados: ${processos.length} processo${processos.length !== 1 ? 's' : ''} e ${produtos.length} produto${produtos.length !== 1 ? 's' : ''}`);
    };
    reader.readAsText(file);
  };
  input.click();
}

async function sincronizarOmie() {
  let pagina = 1, todos = [];
  while (true) {
    const r = await fetch('/omie', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        call:   'ListarProdutos',
        params: [{ pagina, registros_por_pagina: 100, filtrar_apenas_omiepdv: "N" }]
      })
    });
    const data = await r.json();
    if (data.faultstring) throw new Error(data.faultstring);
    if (data.erro)        throw new Error(data.erro);
    const lista = data.produto_servico_listfull || data.produto_servico_cadastro || [];
    todos = todos.concat(lista);
    if (todos.length >= (data.total_de_registros || 0)) break;
    pagina++;
  }
  const produtos = todos.map(p => ({
    produto:          p.descricao || p.codigo,
    codigo:           p.codigo || '',
    ncm:              p.ncm || '',
    familia:          p.familia_produto || '',
    unidade:          p.unidade || 'PC',
    peso_liq_unit:    parseFloat(p.peso_liq)    || 0,
    peso_bruto_unit:  parseFloat(p.peso_bruto)  || 0,
    ii:               parseFloat(p.perc_ii)  / 100 || 0,
    ipi:              parseFloat(p.perc_ipi) / 100 || 0,
    pis_importacao:   0.021,
    cofins_importacao:0.1065,
    pis_venda:        0.0165,
    cofins_venda:     0.076,
    icms_intra:       0.14,  icms_inter:       0.04,
    reg_espec_intra:  0.14,  reg_espec_inter:  0.015
  }));
  localStorage.setItem('pilar_produtos', JSON.stringify(produtos));
  return produtos.length;
}

async function fetchPTAX(inputId) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const orig = el.placeholder;
  el.placeholder = 'buscando…';
  const hoje = new Date();
  for (let i = 0; i < 7; i++) {
    const d  = new Date(hoje);
    d.setDate(hoje.getDate() - i);
    const mm   = String(d.getMonth()+1).padStart(2,'0');
    const dd   = String(d.getDate()).padStart(2,'0');
    const yyyy = d.getFullYear();
    try {
      const r = await fetch(
        `https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/` +
        `CotacaoDolarDia(dataCotacao='${mm}-${dd}-${yyyy}')?$top=1&$format=json&$select=cotacaoVenda`
      );
      const j = await r.json();
      const t = j?.value?.[0]?.cotacaoVenda;
      if (t) { el.value = t.toFixed(4); el.placeholder = orig; return; }
    } catch { /* tenta dia anterior */ }
  }
  el.placeholder = 'indisponível';
}

function npRemoveItem(i) {
  _itens.splice(i, 1);
  if (_itens.length === 0) _itens.push(newItemRow());
  npRenderItens();
  npRecalcular();
}

function npItemChange(i, campo, valor) {
  if (campo === 'quantidade' || campo === 'fob_unit_usd') {
    _itens[i][campo] = parseFloat(valor) || 0;
    const total = (_itens[i].quantidade || 0) * (_itens[i].fob_unit_usd || 0);
    const el = document.getElementById(`np-total-${i}`);
    if (el) el.textContent = 'USD ' + fmtN(total);
    npAtualizarRodape();
    npRecalcular();
  } else if (campo === 'codigo') {
    _itens[i].codigo = valor;
    const _pls = JSON.parse(localStorage.getItem('pilar_produtos') || '[]');
    _itens[i].is_novo = !!valor && !_pls.some(p => (p.codigo||'').toLowerCase() === valor.toLowerCase());
    const numCell = document.getElementById(`np-num-${i}`);
    if (numCell) {
      numCell.innerHTML = _itens[i].is_novo
        ? `<span title="Produto novo — será exportado para o Omie" style="color:#F9A825;font-weight:700;cursor:default">★${i+1}</span>`
        : String(i + 1);
    }
    npUpdateExportBtn();
  } else {
    _itens[i][campo] = valor;
  }
}

    frete: {
      valor_usd:  parseFloat(val('np-frete'))    || 0,
      containers: parseInt(val('np-containers')) || 1
    },
    itens: itensValidos
  };

  // Calcular e persistir resultado
  const resCalc = typeof Calc !== 'undefined' ? npCalcResultado(npBuildProcessoAtual()) : null;
  dadosForm.resultado = resCalc ? {
    fob_total_usd:     resCalc.fob_total_usd,
    cif_total_brl:     resCalc.cif_total_brl,
    custo_final_total: resCalc.custo_final_total,
    nf_total_brl:      resCalc.nf_total_brl,
    lucro_brl:         resCalc.lucro_brl,
    margem_pct:        resCalc.margem_pct,
    imp_importacao:    resCalc.imp_imp?.total || 0,
    custos_op_total:   resCalc.custos_op_total
  } : {};

  const todos = JSON.parse(localStorage.getItem('pilar_processos') || '[]');

  if (_npEditId) {
    const idx = todos.findIndex(p => p.id === _npEditId);
    if (idx >= 0) {
      todos[idx] = { ...todos[idx], ...dadosForm, atualizado_em: new Date().toISOString() };
    }
  } else {
    todos.push({
      id: Date.now(),
      status: 'ativo',
      criado_em: new Date().toISOString(),
      ...dadosForm
    });
  }

  localStorage.setItem('pilar_processos', JSON.stringify(todos));

  const link = Array.from(document.querySelectorAll('.nav-link'))
    .find(el => el.textContent.includes('Processos') && !el.textContent.includes('Novo'));
  if (link) navTo(link, renderProcessos);
  else renderProcessos();
}

function procEditar(id) {

// ── Precificação — Seção 4 ────────────────────────────────────────────────

function npBuildProcessoAtual() {
  const cfg = JSON.parse(localStorage.getItem('pilar_config') || '{}');
  const d   = cfg.defaults || {};
  return {
    cambios: {
      di:      { taxa: parseFloat(val('np-cambio-di'))      || 0 },
      fiscal:  { taxa: parseFloat(val('np-cambio-fiscal'))  || 0 },
      cliente: { taxa: parseFloat(val('np-cambio-cliente')) || 0 }
    },
    frete: {
      valor_usd:     parseFloat(val('np-frete'))    || 0,
      containers:    parseInt(val('np-containers')) || 1,
      dif_frete_pct: d.dif_frete_pct || 0.025
    },
    custos_defaults: {
      siscomex:           d.siscomex            || 192.79,
      despachante:        d.despachante          || 2500,
      agente_cargas:      d.agente_cargas        || 1700,
      armazenagem:        d.armazenagem          || 2500,
      capatazia:          d.capatazia            || 1010,
      operador_logistico: d.operador_logistico   || 1000,
      comissao_pct:       d.comissao_pct         || 0.015,
      frete_rodoviario:   0
    },
    itens: _itens.filter(it => (it.quantidade||0) > 0 && (it.fob_unit_usd||0) > 0)
  };
}

function npCalcResultado(proc) {
  const itens = proc.itens || [];
  if (!itens.length) return null;

  const taxaCalc    = proc.cambios?.fiscal?.taxa || proc.cambios?.di?.taxa || 0;
  const taxaCliente = proc.cambios?.cliente?.taxa || taxaCalc;
  if (!taxaCalc) return null;

  const comissaoPct = proc.custos_defaults?.comissao_pct || 0.015;
  const freteUSD    = proc.frete?.valor_usd  || 0;
  const containers  = proc.frete?.containers || 1;
  const d           = proc.custos_defaults   || {};

  const fobTotalUSD = itens.reduce((s, it) => s + it.quantidade * it.fob_unit_usd, 0);
  if (!fobTotalUSD) return null;

  // Custos totais do processo (serão distribuídos proporcionalmente)
  const agenteT    = (d.agente_cargas      || 1700) * containers;
  const armazT     = (d.armazenagem        || 2500) * containers;
  const capatT     = (d.capatazia          || 1010) * containers;
  const oplogT     = (d.operador_logistico || 1000) * containers;
  const frodT      = (d.frete_rodoviario   || 0)   * containers;

  const rItens = itens.map(item => {
    const prop = (item.quantidade * item.fob_unit_usd) / fobTotalUSD;
    const ctx  = {
      fobTotalUSD,
      freteUSD:    freteUSD * prop,         // frete proporcional ao FOB do item
      taxaCalc, taxaCliente, comissaoPct,
      custos: {
        siscomex:    d.siscomex    || 192.79, // calc.js já rateia internamente por prop
        despachante: d.despachante || 2500,   // idem
        agente:      agenteT * prop,
        armazenagem: armazT  * prop,
        capatazia:   capatT  * prop,
        oplog:       oplogT  * prop,
        frodRodov:   frodT   * prop
      }
    };
    return Calc.calcItem(
      { ...item, containers: 1, margem_pct: item.margem_pct ?? 0.20 },
      ctx
    );
  });

  // Agregar totais
  let totII=0, totPIS=0, totCOF=0, totIPI=0, totSisc=0, totAfrmm=0, totDifFrete=0;
  let totCustoFinal=0, totPVBRL=0, totLucro=0;
  let totIcmsEf=0, totPisV=0, totCofV=0, totCSLL=0, totIR=0, totIRAdic=0, totCom=0;

  rItens.filter(Boolean).forEach(r => {
    totII        += r.ii;          totPIS      += r.pisImp;  totCOF      += r.cofImp;
    totIPI       += r.ipi;         totSisc     += r.siscomexRat;
    totAfrmm     += r.afrmm;       totDifFrete += r.difFrete;
    totCustoFinal+= r.custoImpTotal;
    totPVBRL     += r.pvTotal;     totLucro    += r.lucroLiqTotal;
    totIcmsEf    += r.icmsEf * r.qtd; totPisV += r.pisV * r.qtd; totCofV += r.cofV * r.qtd;
    totCSLL      += r.csll;        totIR       += r.ir;    totIRAdic += r.irAdic;
    totCom       += r.com * r.qtd;
  });

  const cifRS    = fobTotalUSD * taxaCalc + freteUSD * taxaCalc;
  const totImpImp = totII + totPIS + totCOF + totIPI + totSisc + totAfrmm + totDifFrete;
  // Soma direta dos custos operacionais dos defaults (despachante fixo + por container)
  const custosOp = (d.despachante          || 2500) +
                   (d.agente_cargas        || 1700) * containers +
                   (d.armazenagem          || 2600) * containers +
                   (d.capatazia            || 1010) * containers +
                   (d.operador_logistico   || 1000) * containers +
                   (d.frete_rodoviario     || 0);
  const margem    = totPVBRL > 0 ? totLucro / totPVBRL : 0;

  return {
    fob_total_usd: fobTotalUSD,
    cif_total_brl: cifRS,
    imp_imp: { ii: totII, pis: totPIS, cofins: totCOF, ipi: totIPI,
               siscomex: totSisc, afrmm: totAfrmm, dif_frete: totDifFrete, total: totImpImp },
    custos_op_total:   custosOp,
    custo_final_total: totCustoFinal,
    nf_total_brl:  totPVBRL,
    lucro_brl:     totLucro,
    margem_pct:    margem,
    imp_venda:     { icms: totIcmsEf, pis: totPisV, cofins: totCofV,
                     csll: totCSLL, ir: totIR, ir_adicional: totIRAdic, comissao: totCom },
    itens_resultado: rItens
  };
}

function s4Change(i, campo, valor) {
  if (campo === 'margem_pct') {
    _itens[i].margem_pct  = parseFloat(valor) / 100 || 0;
    _itens[i].pv_fixo_usd = 0;
  } else {
    _itens[i].pv_fixo_usd = parseFloat(valor) || 0;
  }
  npRecalcular();
}

  }).join('');

  s4t.innerHTML = `<table class="tbl">
    <thead><tr>
      <th>#</th><th>Descrição</th>

      <th style="text-align:center">PV fixo USD</th>
      <th style="text-align:right">Custo Unit R$</th>

      <th style="text-align:right">Margem Real</th>
    </tr></thead>
    <tbody>${linhas}</tbody>
  </table>`;

  // ── Resumo do processo ──────────────────────────────────────────────────
  if (!s4r) return;
  const ri = res.imp_imp;
  s4r.innerHTML = `

function fcFobTotal() {
  if (!_fcProcesso) return 0;
  if (_fcProcesso.resultado?.fob_total_usd) return _fcProcesso.resultado.fob_total_usd;
  return (_fcProcesso.itens||[]).reduce((s,it) => s+(it.quantidade||0)*(it.fob_unit_usd||0), 0);
}

function fcSelecionarProcesso(id) {
  const corpo = document.getElementById('fc-corpo');
  const btn   = document.getElementById('btn-fc-salvar');
  if (!id) {
    _fcProcesso = null;
    corpo.style.display = 'none';
    btn.disabled = true; btn.style.opacity = '.45'; btn.style.cursor = 'not-allowed';
    return;
  }
  const todos = JSON.parse(localStorage.getItem('pilar_processos') || '[]');
  _fcProcesso = todos.find(p => p.id == id) || null;
  if (!_fcProcesso) return;
  btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
  corpo.style.display = 'block';

  const fobTotal  = fcFobTotal();
  const camFiscal = _fcProcesso.cambios?.fiscal?.taxa || _fcProcesso.cambios?.di?.taxa || 0;

  // Pagamentos
  if (_fcProcesso.pagamentos_fornecedor?.length) {
    _fcPagamentos = JSON.parse(JSON.stringify(_fcProcesso.pagamentos_fornecedor));
  } else {
    _fcPagamentos = [
      { id:Date.now(),   descricao:'Sinal', percentual:0.20, valor_usd:fobTotal*0.20,
        data_prevista:'', data_realizada:null, cambio:camFiscal,
        valor_reais:fobTotal*0.20*camFiscal, status:'previsto' },
      { id:Date.now()+1, descricao:'Saldo', percentual:0.80, valor_usd:fobTotal*0.80,
        data_prevista:'', data_realizada:null, cambio:camFiscal,
        valor_reais:fobTotal*0.80*camFiscal, status:'previsto' }
    ];
  }

  // Recebimentos
  if (_fcProcesso.recebimentos_cliente?.length) {
    _fcRecebimentos = JSON.parse(JSON.stringify(_fcProcesso.recebimentos_cliente));
  } else {
    const camCliente = _fcProcesso.cambios?.cliente?.taxa || camFiscal;
    const nfBRL = _fcProcesso.resultado?.nf_total_brl || 0;
    const nfUSD = camCliente > 0 ? nfBRL / camCliente : 0;
    _fcRecebimentos = [{
      id:Date.now()+2, descricao:'Pagamento', percentual:1.0, valor_usd:nfUSD,
      cambio:camCliente, valor_reais:nfBRL,
      data_prevista:'', data_realizada:null, status:'previsto'
    }];
  }

  fcRenderCambios();
  fcRenderPagamentos();
  fcRenderRecebimentos();
  fcRenderResumo();
}

function fcRenderCambios() {
  const el = document.getElementById('fc-cambios');
  if (!el || !_fcProcesso) return;
  const c = _fcProcesso.cambios || {};
  el.innerHTML = `
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div class="sum-item" style="min-width:120px">
        <div class="val">${fmtN(c.di?.taxa||0,4)}</div><div class="lbl">Câmbio DI</div>
      </div>
      <div class="sum-item" style="min-width:120px">
        <div class="val">${fmtN(c.fiscal?.taxa||0,4)}</div><div class="lbl">Câmbio Fiscal</div>
      </div>
      <div class="sum-item" style="min-width:120px">
        <div class="val">${fmtN(c.cliente?.taxa||0,4)}</div><div class="lbl">Câmbio Cliente</div>
      </div>
      <div style="margin-left:auto">
        <button class="btn btn-s" onclick="fcEditarProcesso()">✎ Editar no Processo</button>
      </div>
    </div>`;
}

function fcRenderPagamentos() {
  const tbody = document.getElementById('fc-pag-tbody');
  if (!tbody) return;
  tbody.innerHTML = _fcPagamentos.map((p, i) => {
    const statusSel = ['previsto','pago','atrasado'].map(s =>
      `<option${p.status===s?' selected':''}>${s}</option>`).join('');
    const pagoStyle  = p.status === 'pago'     ? 'color:#2E7D32;font-weight:600' : '';
    const atrasStyle = p.status === 'atrasado' ? 'color:#C62828;font-weight:600' : '';
    return `<tr style="${p.status==='pago'?'opacity:.75':''}">
      <td><input value="${esc(p.descricao)}" style="width:80px"
        oninput="fcChangePagamento(${i},'descricao',this.value)"></td>
      <td style="white-space:nowrap">
        <input type="number" value="${fmtN(p.percentual*100,1)}" min="0" max="100" step="1" style="width:52px"
          oninput="fcChangePagamento(${i},'percentual',this.value/100)">%
      </td>
      <td id="fc-pag-usd-${i}" style="text-align:right;padding:5px 8px;white-space:nowrap">
        USD ${fmtN(p.valor_usd)}
      </td>
      <td><input type="date" value="${p.data_prevista||''}" style="width:132px"
        oninput="fcChangePagamento(${i},'data_prevista',this.value)"></td>
      <td><input type="number" value="${p.cambio||''}" step="0.0001" style="width:76px" placeholder="0,0000"
        oninput="fcChangePagamento(${i},'cambio',this.value)"></td>
      <td id="fc-pag-brl-${i}" style="text-align:right;padding:5px 8px;white-space:nowrap;font-weight:600;color:var(--turquesa-dark)">
        R$ ${fmtN(p.valor_reais)}
      </td>
      <td>
        <select style="width:88px;padding:4px 6px;${pagoStyle||atrasStyle}"
          oninput="fcChangePagamento(${i},'status',this.value)">${statusSel}</select>
      </td>
      <td style="white-space:nowrap">
        ${p.status !== 'pago'
          ? `<button class="btn btn-s btn-sm" onclick="fcMarcarPago(${i})" style="margin-right:4px">✓ Pago</button>`
          : ''}
        <button class="btn btn-s btn-sm" style="color:#c62828" onclick="fcRemovePagamento(${i})">✕</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:16px;color:var(--cinza-med)">Nenhuma parcela</td></tr>';
  fcAtualizarFootPag();
}

function fcAtualizarFootPag() {
  const tfoot = document.getElementById('fc-pag-tfoot');
  if (!tfoot) return;
  let totPct=0, totUSD=0, totBRL=0, numTM=0, denTM=0;
  _fcPagamentos.forEach(p => {
    totPct += p.percentual||0; totUSD += p.valor_usd||0; totBRL += p.valor_reais||0;
    if ((p.valor_usd||0)>0 && (p.cambio||0)>0) { numTM += p.valor_usd*p.cambio; denTM += p.valor_usd; }
  });
  const taxaMedia = denTM > 0 ? numTM / denTM : 0;
  const pctOk = Math.abs(totPct - 1) < 0.005;
  tfoot.innerHTML = `
    <tr style="background:var(--cinza-light);font-weight:700;font-size:13px">
      <td style="padding:7px 8px">TOTAL</td>
      <td style="padding:7px 8px;${!pctOk?'color:#C62828;':''}">${fmtN(totPct*100,1)}%${!pctOk?' ⚠':''}</td>
      <td style="text-align:right;padding:7px 8px">USD ${fmtN(totUSD)}</td>
      <td colspan="2" style="padding:7px 8px;font-size:11px;color:var(--cinza-med);font-weight:400">
        Taxa média pond.: <strong style="color:var(--cinza)">${fmtN(taxaMedia,4)}</strong>
      </td>
      <td style="text-align:right;padding:7px 8px;color:var(--turquesa-dark)">R$ ${fmtN(totBRL)}</td>
      <td colspan="2"></td>
    </tr>
    ${!pctOk ? `<tr><td colspan="8" style="background:#FFF8E1;color:#C62828;font-size:11px;padding:5px 8px">
      ⚠ Parcelas somam ${fmtN(totPct*100,1)}% — devem totalizar 100%.
    </td></tr>` : ''}`;
}

function fcChangePagamento(i, campo, valor) {
  const p = _fcPagamentos[i];
  if (!p) return;
  if (campo === 'percentual') {
    p.percentual  = parseFloat(valor) || 0;
    p.valor_usd   = fcFobTotal() * p.percentual;
    p.valor_reais = p.valor_usd * (p.cambio||0);
    const uEl = document.getElementById(`fc-pag-usd-${i}`);
    const bEl = document.getElementById(`fc-pag-brl-${i}`);
    if (uEl) uEl.textContent = 'USD ' + fmtN(p.valor_usd);
    if (bEl) bEl.textContent = 'R$ '  + fmtN(p.valor_reais);
    fcAtualizarFootPag(); fcRenderResumo();
  } else if (campo === 'cambio') {
    p.cambio      = parseFloat(valor) || 0;
    p.valor_reais = (p.valor_usd||0) * p.cambio;
    const bEl = document.getElementById(`fc-pag-brl-${i}`);
    if (bEl) bEl.textContent = 'R$ ' + fmtN(p.valor_reais);
    fcAtualizarFootPag(); fcRenderResumo();
  } else {
    p[campo] = valor;
  }
}

function fcAddPagamento() {
  const camFiscal = _fcProcesso?.cambios?.fiscal?.taxa || 0;
  _fcPagamentos.push({ id:Date.now(), descricao:'Nova parcela', percentual:0,
    valor_usd:0, data_prevista:'', data_realizada:null,
    cambio:camFiscal, valor_reais:0, status:'previsto' });
  fcRenderPagamentos();
}

function fcRemovePagamento(i) {
  _fcPagamentos.splice(i, 1);
  fcRenderPagamentos(); fcRenderResumo();
}

function fcMarcarPago(i) {
  _fcPagamentos[i].status = 'pago';
  _fcPagamentos[i].data_realizada = today();
  fcRenderPagamentos();
}

function fcNfTotalUSD() {
  const camCliente = _fcProcesso?.cambios?.cliente?.taxa || 0;
  const nfBRL      = _fcProcesso?.resultado?.nf_total_brl || 0;
  if (camCliente > 0 && nfBRL > 0) return nfBRL / camCliente;
  // Fallback: soma dos recebimentos já existentes
  return _fcRecebimentos.reduce((s, r) => s + (r.valor_usd || 0), 0);
}

function fcRenderRecebimentos() {
  const tbody = document.getElementById('fc-rec-tbody');
  if (!tbody) return;

  const nfTotalUSD = fcNfTotalUSD();
  const n          = _fcRecebimentos.length || 1;
  const nlEl = document.getElementById('fc-rec-nf-label');
  if (nlEl) nlEl.textContent = nfTotalUSD > 0 ? `Total NF: USD ${fmtN(nfTotalUSD)}` : '';

  tbody.innerHTML = _fcRecebimentos.map((r, i) => {
    const statusSel = ['previsto','recebido','atrasado'].map(s =>
      `<option${r.status===s?' selected':''}>${s}</option>`).join('');
    const pct = ((r.percentual ?? 1/n) * 100).toFixed(1);
    return `<tr style="${r.status==='recebido'?'opacity:.75':''}">
      <td><input value="${esc(r.descricao)}" style="width:110px"
        oninput="fcChangeRecebimento(${i},'descricao',this.value)"></td>
      <td style="white-space:nowrap">
        <input type="number" value="${pct}" min="0" max="100" step="1" style="width:52px"
          oninput="fcChangeRecebimento(${i},'percentual',this.value)">%
      </td>
      <td id="fc-rec-usd-${i}" style="text-align:right;padding:5px 8px;white-space:nowrap">
        USD ${fmtN(r.valor_usd)}
      </td>
      <td><input type="number" value="${r.cambio||''}" step="0.0001" style="width:76px" placeholder="0,0000"
        oninput="fcChangeRecebimento(${i},'cambio',this.value)"></td>
      <td id="fc-rec-brl-${i}" style="text-align:right;padding:5px 8px;white-space:nowrap;font-weight:600;color:var(--turquesa-dark)">
        R$ ${fmtN(r.valor_reais)}
      </td>
      <td><input type="date" value="${r.data_prevista||''}" style="width:132px"
        oninput="fcChangeRecebimento(${i},'data_prevista',this.value)"></td>
      <td>
        <select style="width:88px;padding:4px 6px"
          oninput="fcChangeRecebimento(${i},'status',this.value)">${statusSel}</select>
      </td>
      <td style="white-space:nowrap">
        ${r.status !== 'recebido'
          ? `<button class="btn btn-s btn-sm" onclick="fcMarcarRecebido(${i})" style="margin-right:4px">✓ Recebido</button>`
          : ''}
        <button class="btn btn-s btn-sm" style="color:#c62828" onclick="fcRemoveRecebimento(${i})">✕</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:16px;color:var(--cinza-med)">Nenhum recebimento</td></tr>';
  fcAtualizarFootRec();
}

function fcAtualizarFootRec() {
  const tfoot = document.getElementById('fc-rec-tfoot');
  if (!tfoot) return;
  let totPct=0, totUSD=0, totBRL=0;
  _fcRecebimentos.forEach(r => {
    totPct += r.percentual || 0;
    totUSD += r.valor_usd  || 0;
    totBRL += r.valor_reais|| 0;
  });
  const pctOk = Math.abs(totPct - 1) < 0.005;
  tfoot.innerHTML = `
    <tr style="background:var(--cinza-light);font-weight:700;font-size:13px">
      <td style="padding:7px 8px">TOTAL</td>
      <td style="padding:7px 8px;${!pctOk?'color:#C62828;':''}">${fmtN(totPct*100,1)}%${!pctOk?' ⚠':''}</td>
      <td style="text-align:right;padding:7px 8px">USD ${fmtN(totUSD)}</td>
      <td></td>
      <td style="text-align:right;padding:7px 8px;color:var(--turquesa-dark)">R$ ${fmtN(totBRL)}</td>
      <td colspan="3"></td>
    </tr>
    ${!pctOk ? `<tr><td colspan="8" style="background:#FFF8E1;color:#C62828;font-size:11px;padding:5px 8px">
      ⚠ Parcelas somam ${fmtN(totPct*100,1)}% — devem totalizar 100%.
    </td></tr>` : ''}`;
}

function fcChangeRecebimento(i, campo, valor) {
  const r = _fcRecebimentos[i];
  if (!r) return;
  if (campo === 'percentual') {
    r.percentual  = parseFloat(valor) / 100 || 0;
    r.valor_usd   = parseFloat((fcNfTotalUSD() * r.percentual).toFixed(2));
    r.valor_reais = parseFloat((r.valor_usd * (r.cambio||0)).toFixed(2));
    const uEl = document.getElementById(`fc-rec-usd-${i}`);
    const bEl = document.getElementById(`fc-rec-brl-${i}`);
    if (uEl) uEl.textContent = 'USD ' + fmtN(r.valor_usd);
    if (bEl) bEl.textContent = 'R$ '  + fmtN(r.valor_reais);
    fcAtualizarFootRec(); fcRenderResumo();
  } else if (campo === 'cambio') {
    r.cambio      = parseFloat(valor) || 0;
    r.valor_reais = parseFloat((r.valor_usd * r.cambio).toFixed(2));
    const bEl = document.getElementById(`fc-rec-brl-${i}`);
    if (bEl) bEl.textContent = 'R$ ' + fmtN(r.valor_reais);
    fcAtualizarFootRec(); fcRenderResumo();
  } else {
    r[campo] = valor;
  }
}

function fcRedistribuirRecebimentos() {
  if (!_fcRecebimentos.length) return;
  const n          = _fcRecebimentos.length;
  const nfTotalUSD = fcNfTotalUSD();
  const camCliente = _fcProcesso?.cambios?.cliente?.taxa || 0;
  const parteP     = parseFloat((1 / n).toFixed(6));
  _fcRecebimentos.forEach((r, i) => {
    r.percentual  = i < n - 1 ? parteP : parseFloat((1 - parteP * (n - 1)).toFixed(6));
    r.valor_usd   = parseFloat((nfTotalUSD * r.percentual).toFixed(2));
    r.valor_reais = parseFloat((r.valor_usd * (r.cambio || camCliente || 0)).toFixed(2));
  });
}

function fcAddRecebimento() {
  const camCliente = _fcProcesso?.cambios?.cliente?.taxa || 0;
  _fcRecebimentos.push({ id:Date.now(), descricao:'Pagamento', percentual:0,
    valor_usd:0, cambio:camCliente, valor_reais:0,
    data_prevista:'', data_realizada:null, status:'previsto' });
  fcRedistribuirRecebimentos();
  fcRenderRecebimentos();
  fcRenderResumo();
}

function fcRemoveRecebimento(i) {
  _fcRecebimentos.splice(i, 1);
  fcRedistribuirRecebimentos();
  fcRenderRecebimentos();
  fcRenderResumo();
}

function fcMarcarRecebido(i) {
  _fcRecebimentos[i].status = 'recebido';
  _fcRecebimentos[i].data_realizada = today();
  fcRenderRecebimentos();
}

function fcRenderResumo() {
  const el = document.getElementById('fc-resumo');
  if (!el || !_fcProcesso) return;

  const totReceitas = _fcRecebimentos.reduce((s,r) => s+(r.valor_reais||0), 0);
  const totPagFor   = _fcPagamentos.reduce((s,p) => s+(p.valor_reais||0), 0);
  const custoFinal  = _fcProcesso.resultado?.custo_final_total || 0;
  const lucro       = _fcProcesso.resultado?.lucro_brl || 0;
  const margem      = _fcProcesso.resultado?.margem_pct || 0;
  const saldo       = totReceitas - (custoFinal || totPagFor);
  const margemEst   = totReceitas > 0 ? saldo / totReceitas : 0;

  const saldoColor = saldo >= 0 ? '' : 'color:#C62828';
  const saldoClass = saldo >= 0 ? 'sum-item dk' : 'sum-item';

  el.innerHTML = `
    <div class="sum-grid">
      <div class="sum-item">
        <div class="val">R$ ${fmtN(totReceitas)}</div>
        <div class="lbl">Total Receitas</div>
      </div>
      <div class="sum-item">
        <div class="val">R$ ${fmtN(totPagFor)}</div>
        <div class="lbl">Pagto. Fornecedor</div>
      </div>
      <div class="sum-item">
        <div class="val">R$ ${fmtN(custoFinal||totPagFor)}</div>
        <div class="lbl">Custo Total</div>
      </div>
      <div class="${saldoClass}">
        <div class="val" style="${saldoColor}">R$ ${fmtN(saldo)}</div>
        <div class="lbl">Saldo</div>
      </div>
      <div class="sum-item dk">
        <div class="val">${fmtN(margemEst*100,2)}%</div>
        <div class="lbl">Margem Estimada</div>
      </div>
      ${lucro ? `<div class="sum-item dk">
        <div class="val">R$ ${fmtN(lucro)}</div><div class="lbl">Lucro Calculado</div>
      </div>` : ''}
      ${margem ? `<div class="sum-item dk">
        <div class="val">${fmtN(margem*100,2)}%</div><div class="lbl">Margem Calculada</div>
      </div>` : ''}
    </div>`;
}

function fcEditarProcesso() {
  if (!_fcProcesso) return;
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-link[onclick*=renderNovoProcesso]')?.classList.add('active');
  renderNovoProcesso(_fcProcesso);
}

function fcSalvar() {
  if (!_fcProcesso) return;
  const todos = JSON.parse(localStorage.getItem('pilar_processos') || '[]');
  const idx   = todos.findIndex(p => p.id === _fcProcesso.id);
  if (idx >= 0) {
    todos[idx].pagamentos_fornecedor = _fcPagamentos;
    todos[idx].recebimentos_cliente  = _fcRecebimentos;
    todos[idx].atualizado_em = new Date().toISOString();
    localStorage.setItem('pilar_processos', JSON.stringify(todos));
    toast('✓ Fluxo de caixa salvo');
  }
}

function diToggleBanco() {
  const body = document.getElementById('banco-body');
  const icon = document.getElementById('banco-toggle-icon');
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  icon.textContent   = open ? '▲ recolher' : '▼ expandir';
  if (open) renderBancoTabela();
}

function diImportarExcel() {
  const fi = document.getElementById('di-file-input');
  if (fi) { fi.value = ''; fi.click(); }
}

function diProcessarExcel(input) {
  const file = input?.files?.[0];
  if (!file || typeof XLSX === 'undefined') return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb   = XLSX.read(e.target.result, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

    // Localiza linha de cabeçalho e colunas
    let headerRow = -1, codigoCol = -1, diCol = -1;
    for (let i = 0; i < Math.min(20, rows.length); i++) {
      const row = rows[i] || [];
      let cCol = -1, dCol = -1;
      for (let j = 0; j < row.length; j++) {
        const c = String(row[j] || '').trim().toUpperCase()
          .normalize('NFD').replace(/[̀-ͯ]/g, ''); // remove acentos
        if ((c.includes('CODIGO') || c.includes('PRODUTO')) && cCol < 0) cCol = j;
        if ((c === 'DESCRICAO DI' || c.endsWith(' DI') || c === 'DESC DI') && dCol < 0) dCol = j;
      }
      if (cCol >= 0 && dCol >= 0) { headerRow = i; codigoCol = cCol; diCol = dCol; break; }
    }

    if (codigoCol < 0 || diCol < 0) {
      toast('Colunas não encontradas. Verifique o formato do arquivo.');
      return;
    }

    const banco = JSON.parse(localStorage.getItem('pilar_descricoes_di') || '{}');
    let importadas = 0, jaExistiam = 0;
    for (let i = headerRow + 1; i < rows.length; i++) {
      const row    = rows[i] || [];
      const codigo = String(row[codigoCol] || '').trim();
      const descDI = String(row[diCol]     || '').trim();
      if (!codigo || !descDI) continue;
      if (banco[codigo] !== undefined) { jaExistiam++; }
      else { banco[codigo] = descDI; importadas++; }
    }
    localStorage.setItem('pilar_descricoes_di', JSON.stringify(banco));
    toast(`✓ ${importadas} descrição${importadas !== 1 ? 'ões' : ''} importada${importadas !== 1 ? 's' : ''}, ${jaExistiam} já existiam`);
    renderBancoTabela();
  };
  reader.readAsArrayBuffer(file);
}

function renderBancoTabela() {
  const el = document.getElementById('banco-tabela');
  if (!el) return;
  const banco = JSON.parse(localStorage.getItem('pilar_descricoes_di') || '{}');
  const q     = (document.getElementById('di-busca')?.value || '').toLowerCase();
  const entries = Object.entries(banco)
    .filter(([k, v]) => !q || k.toLowerCase().includes(q) || v.toLowerCase().includes(q))
    .sort((a, b) => a[0].localeCompare(b[0]));

  if (entries.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--cinza-med)">Nenhuma descrição cadastrada.</div>';
    return;

  el.innerHTML = `<table class="tbl"><thead><tr>

  </tr></thead><tbody>${

function buildDespachante(proc, numeroDI, obs) {
  const g    = proc.dados_gerais || {};
  const rows = [];
  rows.push([`RESUMO PARA DESPACHANTE — ${proc.numero}`]);
  rows.push(['Importador: PILAR IMPORTS LTDA', '', `Fornecedor: ${g.fornecedor||''}`, '', `País: ${g.pais||''}`]);
  if (numeroDI) rows.push([`DI / DUIMP: ${numeroDI}`]);
  rows.push([]);
  rows.push(['CÓDIGO OMIE','DESCRIÇÃO','DESCRIÇÃO DI','NCM','QTD','UN',
             'FOB UNIT USD','FOB TOTAL USD','PESO LÍQ (kg)','PESO BRUTO (kg)','GSM','LARGURA CM']);

  let totQty=0, totFOB=0, totPL=0, totPB=0;
  (proc.itens||[]).forEach((it, i) => {
    const descDI = document.getElementById(`di-${i}`)?.value.trim() || '';
    const tot    = (it.quantidade||0)*(it.fob_unit_usd||0);
    const pl     = (it.quantidade||0)*(it.peso_liq_unit||0);
    const pb     = (it.quantidade||0)*(it.peso_bruto_unit||0);
    totQty+=it.quantidade||0; totFOB+=tot; totPL+=pl; totPB+=pb;
    rows.push([
      it.codigo||'', it.descricao||'', descDI, it.ncm||'',
      it.quantidade||0, it.unidade||'PC',
      it.fob_unit_usd||0, parseFloat(tot.toFixed(2)),
      parseFloat(pl.toFixed(3)), parseFloat(pb.toFixed(3)),
      it.gsm||'', it.largura_cm||''
    ]);
  });

  rows.push([]);
  rows.push(['TOTAL','','','', totQty,'', '', parseFloat(totFOB.toFixed(2)),
             parseFloat(totPL.toFixed(3)), parseFloat(totPB.toFixed(3))]);
  if (obs) { rows.push([]); rows.push(['Obs:', obs]); }
  return rows;
}

function buildOrSheet(proc, obs, pt) {
  const g    = proc.dados_gerais || {};
  const rows = [];
  rows.push(['PILAR IMPORTS LTDA']);
  rows.push([]);
  if (pt) {
    rows.push(['PEDIDO:', proc.numero, '', 'DATA:', g.data_pedido||'']);
    rows.push(['FORNECEDOR:', g.fornecedor||'', '', 'PAÍS:', g.pais||'']);
  } else {
    rows.push(['ORDER:', proc.numero, '', 'DATE:', g.data_pedido||'']);
    rows.push(['SUPPLIER:', g.fornecedor||'', '', 'COUNTRY:', g.pais||'']);
  }
  rows.push(['INCOTERM:', g.incoterm||'FOB']);
  rows.push([]);
  rows.push(pt
    ? ['ITEM','QUANTIDADE','PREÇO UNIT (USD)','COR / ESTAMPA','UN','GSM','TAMANHO (CM)','OBS.']
    : ['ITEM','QUANTITY','UNIT PRICE (USD)','COLOR / DESIGN','UND','GSM','ROLL SIZE (CM)','OBS.']);

  let totalQty = 0, totalFOB = 0;
  (proc.itens||[]).forEach((it, i) => {
    const tot = (it.quantidade||0)*(it.fob_unit_usd||0);
    totalQty += it.quantidade||0; totalFOB += tot;
    rows.push([it.descricao||it.codigo||`Item ${i+1}`, it.quantidade||0, it.fob_unit_usd||0,
               it.cor||'', it.unidade||'PC', it.gsm||'', it.largura_cm||'', it.obs||'']);
  });

  rows.push([]);
  rows.push(['', pt?'TOTAL QUANTIDADE:':'TOTAL QUANTITY:', totalQty]);
  rows.push(['', pt?'TOTAL FOB (USD):':'TOTAL FOB (USD):', `USD ${fmtN(totalFOB,2)}`]);
  rows.push([]);
  if (obs) rows.push([pt?'OBS:':'OBS:', obs]);
  rows.push([pt?'COND. PAGAMENTO:':'PAYMENT TERMS:', g.cond_pagamento||'']);
  rows.push([pt?'PREV. EMBARQUE:':'EST. SHIPMENT:', g.prev_embarque||'']);
  rows.push([]);
  rows.push([pt
    ? 'Favor confirmar este pedido assinando abaixo e devolvendo uma cópia.'
    : 'Please confirm this order by signing below and returning a copy.']);
  rows.push([]);
  rows.push([pt?'ASSINATURA DO EXPORTADOR:':'EXPORTER SIGNATURE:', '', '', '____________________________']);
  rows.push([pt?'DATA:':'DATE:', '', '', '____________________________']);
  return rows;
}

function atualizarFOBProdutos(itens) {
  const produtos = JSON.parse(localStorage.getItem('pilar_produtos') || '[]');
  let count = 0;
  itens.forEach(it => {
    if (!it.codigo || !(it.fob_unit_usd > 0)) return;
    const idx = produtos.findIndex(p => p.codigo === it.codigo);
    if (idx < 0) return;
    produtos[idx].fob_unit_usd = it.fob_unit_usd;
    if (!produtos[idx].menor_fob || it.fob_unit_usd < produtos[idx].menor_fob)
      produtos[idx].menor_fob = it.fob_unit_usd;
    count++;
  });
  if (count > 0) localStorage.setItem('pilar_produtos', JSON.stringify(produtos));
  return count;
}

          <select id="cat-familia" style="padding:8px 10px;border:1px solid var(--border);border-radius:4px;font-size:13px"
            onchange="catFiltrar()">
            <option value="">Todas as famílias</option>${famOpts}
          </select>
          <span id="cat-count" style="font-size:12px;color:var(--cinza-med)">${produtos.length} produtos</span>
        </div>
      </div>

      <div id="cat-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px"></div>
    </div>`;

  catRenderGrade(produtos);
}

function catRenderGrade(lista) {
  const grid  = document.getElementById('cat-grid');
  const count = document.getElementById('cat-count');
  if (!grid) return;
  if (count) count.textContent = `${lista.length} produto${lista.length !== 1 ? 's' : ''}`;

  if (!lista.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--cinza-med)">
      <div style="font-size:36px;margin-bottom:12px">📦</div>
      <div style="font-weight:600;margin-bottom:6px">Catálogo vazio</div>
      <div style="font-size:13px">Importe um .xlsx do Omie ou sincronize via API.</div>
    </div>`;
    return;
  }

  grid.innerHTML = lista.slice(0, 300).map(p => `
    <div style="background:var(--white);border:1px solid var(--border);border-radius:6px;padding:12px 14px">
      <div style="font-size:13px;font-weight:600;color:var(--cinza);line-height:1.4;margin-bottom:6px">${p.produto}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;font-size:11px">
        ${p.codigo   ? `<span style="background:var(--cinza-light);padding:1px 7px;border-radius:3px">${p.codigo}</span>`           : ''}
        ${p.ncm      ? `<span style="background:var(--cinza-light);padding:1px 7px;border-radius:3px">NCM: ${p.ncm}</span>`         : ''}
        ${p.familia  ? `<span style="background:var(--cinza-light);padding:1px 7px;border-radius:3px">${p.familia}</span>`          : ''}
        ${p.unidade  ? `<span style="background:var(--cinza-light);padding:1px 7px;border-radius:3px">${p.unidade}</span>`          : ''}
        ${p.ii       ? `<span style="background:#E0F7FA;padding:1px 7px;border-radius:3px;color:#006064">II: ${(p.ii*100).toFixed(1)}%</span>` : ''}
      </div>
    </div>`).join('');
}

function catFiltrar() {
  const q      = (document.getElementById('cat-q')?.value || '').toLowerCase();
  const fam    = document.getElementById('cat-familia')?.value || '';
  const todos  = JSON.parse(localStorage.getItem('pilar_produtos') || '[]');
  const lista  = todos.filter(p =>
    (!fam || p.familia === fam) &&
    (!q   || p.produto.toLowerCase().includes(q) || (p.codigo||'').toLowerCase().includes(q) || (p.ncm||'').includes(q))
  );
  catRenderGrade(lista);
}

async function catSincronizar(btn) {
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '↻ Sincronizando…';
  try {
    const n = await sincronizarOmie();
    toast(`✓ ${n} produtos sincronizados`);
    renderCatalogo();
  } catch (e) {
    toast('Erro: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

function catImportarXlsx() {
  const fi = document.getElementById('cat-file');
  if (fi) { fi.value = ''; fi.click(); }
}

function catProcessarXlsx(input) {
  const file = input?.files?.[0];
  if (!file || typeof XLSX === 'undefined') return;

  const reader = new FileReader();
  reader.onload = e => {
    const wb   = XLSX.read(e.target.result, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

    // Localizar linha de cabeçalho
    const COL_MAP = {
      situacao:    ['situação','situacao'],
      produto:     ['descrição','descricao','description','nome'],
      codigo:      ['código','codigo','code'],
      familia:     ['família de produto','familia de produto','familia','family'],
      ncm:         ['código ncm','codigo ncm','ncm'],
      peso_liq:    ['peso líquido','peso liquido','peso liq'],
      peso_bruto:  ['peso bruto'],
      unidade:     ['unidade','unit']
    };

    let header = -1;
    const cols = {};
    for (let i = 0; i < Math.min(20, rows.length); i++) {
      const row = rows[i] || [];
      const found = {};
      row.forEach((cell, j) => {
        const c = String(cell||'').toLowerCase().trim().normalize('NFD').replace(/[̀-ͯ]/g,'');
        for (const [key, aliases] of Object.entries(COL_MAP)) {
          if (!found[key] && aliases.some(a => c.includes(a.normalize('NFD').replace(/[̀-ͯ]/g,'')))) {
            found[key] = j;
          }
        }
      });
      // Precisa de pelo menos produto e código para considerar válido
      if (found.produto !== undefined && found.codigo !== undefined) {
        header = i; Object.assign(cols, found); break;
      }
    }

    if (header < 0) { toast('Colunas não reconhecidas. Verifique o arquivo.'); return; }

    const get = (row, key) => String(row[cols[key]] ?? '').trim();

    const novos = [];
    for (let i = header + 1; i < rows.length; i++) {
      const row = rows[i] || [];
      const codigo  = get(row, 'codigo');
      const produto = get(row, 'produto');
      if (!codigo && !produto) continue;

      // Pula inativos
      const sit = get(row, 'situacao').toUpperCase();
      if (sit && sit !== 'ATIVO' && sit !== 'A') continue;

      novos.push({
        produto:         produto || codigo,
        codigo:          codigo,
        ncm:             get(row, 'ncm'),
        familia:         get(row, 'familia'),
        unidade:         get(row, 'unidade') || 'PC',
        peso_liq_unit:   parseFloat(get(row, 'peso_liq').replace(',', '.'))  || 0,
        peso_bruto_unit: parseFloat(get(row, 'peso_bruto').replace(',', '.')) || 0,
        ii: 0, ipi: 0,
        pis_importacao: 0.021, cofins_importacao: 0.1065,
        pis_venda: 0.0165, cofins_venda: 0.076,
        icms_intra: 0.14, icms_inter: 0.04,
        reg_espec_intra: 0.14, reg_espec_inter: 0.015,
        menor_fob: null
      });
    }

    if (!novos.length) { toast('Nenhum produto válido encontrado no arquivo.'); return; }

    localStorage.setItem('pilar_produtos', JSON.stringify(novos));
    toast(`✓ ${novos.length} produto${novos.length !== 1 ? 's' : ''} importado${novos.length !== 1 ? 's' : ''}`);
    renderCatalogo();
  };
  reader.readAsArrayBuffer(file);
}

// ── Autocomplete itens (Novo/Editar Processo) ──────────────────────────────
const _acMatches = {};

function npAcFilter(i, campo, q) {
  const acId = `np-ac-${i}-${campo}`;
  const ac   = document.getElementById(acId);
  if (!ac) return;

  if (!q || q.length < 1) { ac.style.display = 'none'; return; }

  const ql      = q.toLowerCase();
  const todos   = JSON.parse(localStorage.getItem('pilar_produtos') || '[]');
  const matches = todos.filter(p =>
    (p.codigo  || '').toLowerCase().includes(ql) ||
    (p.produto || '').toLowerCase().includes(ql)
  ).slice(0, 8);

  _acMatches[acId] = matches;

  if (!matches.length) { ac.style.display = 'none'; return; }

  ac.innerHTML = matches.map((p, idx) => `
    <div class="ac-item" onmousedown="npAcSelect(${i},'${acId}',${idx})">
      ${p.codigo ? `<span style="font-family:monospace;font-size:11px;color:var(--cinza-med);margin-right:8px">${p.codigo}</span>` : ''}
      <span>${p.produto}</span>
      ${p.ncm ? `<span class="ac-ncm">${p.ncm}</span>` : ''}
    </div>`).join('');
  ac.style.display = 'block';
}

function npAcSelect(i, acId, idx) {
  const p = (_acMatches[acId] || [])[idx];
  if (!p) return;

  _itens[i].codigo          = p.codigo          || '';
  _itens[i].descricao       = p.produto         || '';
  _itens[i].ncm             = p.ncm             || '';
  _itens[i].unidade         = p.unidade         || 'PC';
  _itens[i].is_novo         = false;
  _itens[i].peso_liq_unit   = p.peso_liq_unit   || 0;
  _itens[i].peso_bruto_unit = p.peso_bruto_unit || 0;
  _itens[i].aliquotas = {
    ii:                p.ii                || 0,
    ipi:               p.ipi               || 0,
    pis_importacao:    p.pis_importacao    || 0.021,
    cofins_importacao: p.cofins_importacao || 0.1065,
    pis_venda:         p.pis_venda         || 0.0165,
    cofins_venda:      p.cofins_venda      || 0.076,
    icms_intra:        p.icms_intra        || 0.14,
    icms_inter:        p.icms_inter        || 0.04,
    reg_espec_intra:   p.reg_espec_intra   || 0.14,
    reg_espec_inter:   p.reg_espec_inter   || 0.015
  };

  document.querySelectorAll('.ac-list').forEach(el => el.style.display = 'none');
  npRenderItens();
  npRecalcular();
}

// Fecha dropdowns ao clicar fora de qualquer ac-wrap
document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap'))
    document.querySelectorAll('.ac-list').forEach(el => el.style.display = 'none');
});

// ── Exportação Omie ────────────────────────────────────────────────────────
function npUpdateExportBtn() {
  const btn = document.getElementById('btn-exportar-omie');
  if (!btn) return;
  const count = _itens.filter(it => it.is_novo).length;
  if (count === 0) {
    btn.textContent = 'Exportar p/ Omie (nenhum novo)';
    btn.disabled = true;
    btn.style.cssText += ';opacity:.55;cursor:not-allowed;color:rgba(255,255,255,.5);background:rgba(255,255,255,.1)';
  } else {
    btn.textContent = `⬇ Exportar ${count} novo${count > 1 ? 's' : ''} p/ Omie`;
    btn.disabled = false;
    btn.style.cssText += ';opacity:1;cursor:pointer;color:#fff;background:rgba(255,255,255,.2)';
  }
}

function npExportarOmie() {
  if (typeof XLSX === 'undefined') { toast('SheetJS não carregado.'); return; }
  const novos = _itens.filter(it => it.is_novo && (it.codigo || it.descricao));
  if (!novos.length) return;

  const FAMILIA_MAP = {
    'MICL': 'TECIDOS', 'MITE': 'TECIDOS', 'MIMA': 'TECIDOS', 'MIVO': 'TECIDOS',
    'COBT': 'COLCHAS', 'COBJ': 'COLCHAS', 'COBE': 'COLCHAS',
    'ESCO': 'CONSTRUÇÃO', 'ESPI': 'CONSTRUÇÃO',
    'ALMO': 'ALMOFADAS', 'TOAL': 'TOALHAS', 'TAPE': 'TAPETES',
    'STOR': 'CORTINAS', 'CORT': 'CORTINAS'
  };

  function detectFamilia(codigo) {
    return FAMILIA_MAP[(codigo || '').toUpperCase().slice(0, 4)] || '';
  }

  const headerRow = new Array(34).fill(null);
  const headerNames = [
    'Código de Integração', 'Código do Produto *', 'Descrição do Produto *',
    'Código NCM *', 'CEST', 'Código EAN (GTIN)', 'Preço Unitário de Venda',
    'Unidade *', 'Família de Produto', 'Estoque Mínimo', 'Estoque Atual',
    'Preço Unitário de Custo', 'Data para Ajuste de Estoque', 'Estoque Inicial?',
    'Local de Estoque *', 'Peso Líquido (Kg)', 'Peso Bruto (Kg)',
    'Altura (centímetros)', 'Largura (centímetros)', 'Profundidade (centímetros)',
    'Marca', 'Modelo', 'Dias de Garantia', 'Dias de Crossdocking',
    'Leadtime de Ressuprimento', 'Cupom Fiscal (PDV)?', 'Marketplace?',
    'Tipo do Produto (Bloco K) *', 'Origem da Mercadoria',
    'Produzido em Escala Relevante?', 'CNPJ do Fabricante',
    'Preço Tabelado (Pauta)', 'Ficha de Conteúdo de Importação (FCI)'
  ];
  headerNames.forEach((h, j) => { headerRow[j + 1] = h; });

  const aoa = [
    new Array(34).fill(null),
    new Array(34).fill(null),
    new Array(34).fill(null),
    new Array(34).fill(null),
    headerRow,
    ...novos.map(it => {
      const row = new Array(34).fill(null);
      row[2]  = it.codigo                       || null; // C
      row[3]  = it.descricao                    || null; // D
      row[4]  = it.ncm                          || null; // E
      row[8]  = it.unidade                      || 'PC'; // I
      row[9]  = detectFamilia(it.codigo);                // J
      row[15] = '00';                                    // P
      row[16] = it.peso_liq_unit   || null;             // Q
      row[17] = it.peso_bruto_unit || null;             // R
      row[19] = it.largura_cm      || null;             // T
      row[21] = 'PILAR';                                // V
      row[28] = '00';                                   // AC
      row[29] = '1';                                    // AD
      return row;
    })
  ];

  const numero = val('np-numero') || 'NOVO';
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  XLSX.utils.book_append_sheet(wb, ws, 'Omie_Produtos');
  XLSX.writeFile(wb, `OMIE_NOVOS_PRODUTOS_${numero}.xlsx`);
  toast(`✓ ${novos.length} produto(s) exportado(s) — importe no Omie para cadastrar`);
}

// ── Persistência servidor ──────────────────────────────────────────────────
const _PILAR_KEYS = new Set(['pilar_processos','pilar_config','pilar_descricoes_di','pilar_produtos']);
let _syncTimer = null;

// Hook transparente: qualquer localStorage.setItem numa chave PILAR dispara sync
const _lsSetOrig = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value) {
  _lsSetOrig(key, value);
  if (_PILAR_KEYS.has(key)) {
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(_apiSincronizar, 400);
  }
};

function _apiSincronizar() {
  const dados = {
    pilar_processos:     JSON.parse(localStorage.getItem('pilar_processos')     || '[]'),
    pilar_config:        JSON.parse(localStorage.getItem('pilar_config')        || '{}'),
    pilar_descricoes_di: JSON.parse(localStorage.getItem('pilar_descricoes_di') || '{}')
  };
  fetch('/api/dados', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(dados)
  }).catch(() => {});

  const produtos = JSON.parse(localStorage.getItem('pilar_produtos') || '[]');
  fetch('/api/produtos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(produtos)
  }).catch(() => {});
}

async function _apiCarregar() {
  try {
    const [rDados, rProd] = await Promise.all([
      fetch('/api/dados'),
      fetch('/api/produtos')
    ]);
    if (rDados.ok) {
      const d = await rDados.json();
      if (Array.isArray(d.pilar_processos))
        _lsSetOrig('pilar_processos', JSON.stringify(d.pilar_processos));
      if (d.pilar_config && typeof d.pilar_config === 'object')
        _lsSetOrig('pilar_config', JSON.stringify(d.pilar_config));
      if (d.pilar_descricoes_di && typeof d.pilar_descricoes_di === 'object')
        _lsSetOrig('pilar_descricoes_di', JSON.stringify(d.pilar_descricoes_di));
    }
    if (rProd.ok) {
      const p = await rProd.json();
      if (Array.isArray(p)) _lsSetOrig('pilar_produtos', JSON.stringify(p));
    }
  } catch { /* offline — usa cache localStorage */ }
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => { await _apiCarregar(); renderDashboard(); })();
</script>
